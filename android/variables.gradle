// Capacitor Android variables — read by android/app/build.gradle
// targetSdkVersion = 36 (Android 16) required for Google Play from 2026
// minSdkVersion    = 28 required for BiometricPrompt.AuthenticatorTypes.BIOMETRIC_STRONG (Class 3)
ext {
    minSdkVersion                     = 28
    compileSdkVersion                 = 36
    targetSdkVersion                  = 36

    // AndroidX library versions pinned against API 36 / AGP 8.x
    androidxActivityVersion           = '1.9.3'
    androidxAppCompatVersion          = '1.7.0'
    androidxCoordinatorLayoutVersion  = '1.3.0'
    androidxCoreVersion               = '1.15.0'
    androidxFragmentVersion           = '1.8.5'
    androidxWebkitVersion             = '1.12.1'

    // Biometric — 1.4.x surfaces BIOMETRIC_STRONG / Class 3 authenticator types
    androidxBiometricVersion          = '1.4.0-alpha02'

    // Splash screen
    coreSplashScreenVersion           = '1.2.0-alpha02'

    // Test dependencies
    junitVersion                      = '4.13.2'
    androidxJunitVersion              = '1.2.1'
    androidxEspressoCoreVersion       = '3.6.1'
}
