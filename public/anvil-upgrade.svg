      <stop offset="0%" stop-color="#FFF2B0"/>
      <stop offset="35%" stop-color="#FFD87A"/>
      <stop offset="70%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8860B"/>
